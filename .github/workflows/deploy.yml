name: Deploy Finance Bot

on:
  push:
    branches: [ "master" ]
    paths-ignore:   # 忽略不影响运行的文件，避免无意义的构建
      - 'README.md'
      - 'finance.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # ARGS 说明:
          # -avzr: 归档模式、详细、压缩、递归
          # --delete: [关键] 删除服务器上有但代码库里没有的文件
          # --exclude='data/': [关键] 排除 data 目录，防止把服务器上的基准价 json 文件删了
          # --exclude='.git/': 排除 git 目录
          # --exclude='venv/': 排除虚拟环境
          ARGS: "-avzr --delete  --exclude='.git/'"
          SOURCE: "."
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: "root"
          TARGET: "/root/lh-finance-sentinel/" 

      # 2. 远程执行 Docker 构建与重启
      - name: Build and Restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting Deployment..."
            
            # 进入项目目录
            cd /root/lh-finance-sentinel
            
            # 1. 构建新镜像 (覆盖 latest 标签)
            echo "🔨 Building Docker Image..."
            docker build -t lh-finance-sentinel:latest .
            
            # 2. 停止并删除旧容器 (如果存在)
            echo "🛑 Stopping old container..."
            docker rm -f lh-finance-sentinel || true
            
            # 3. 启动新容器
            echo "▶️ Starting new container..."
            docker run -d \
              --name lh-finance-sentinel \
              --restart always \
              -v $(pwd)/config:/app/config \
              -e TZ=Asia/Shanghai \
              lh-finance-sentinel:latest
            
            echo "✅ Deployment Finished. 全量代码同步完成！"