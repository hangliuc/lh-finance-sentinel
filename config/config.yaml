# config/config.yaml

notification:
  mode: "webhook"
  
  webhook:
    url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=56c79598-1731-4892-949b-c8becbf6b93d"
    
    # 需要 @ 的手机号 (可选，留空则不艾特)
    mention_list: [] 
  
  gold_webhook:
    url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=8d9d826a-05f3-4d3d-926b-45bcf581ba9c"

schedules:
